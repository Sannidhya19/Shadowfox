<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🚗 Car Price Predictor</h1>

    <form action="/predict" method="post">

        <input type="number" step="0.1" name="present_price" placeholder="Present Price (in Lakhs)" required>
        <input type="number" name="kms_driven" placeholder="KMs Driven" required>
        <input type="number" name="owner" placeholder="Number of Owners" required>
        <input type="number" name="age" placeholder="Car Age (years)" required>

        <select name="fuel_type">
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
        </select>

        <select name="seller_type">
            <option value="Dealer">Dealer</option>
            <option value="Individual">Individual</option>
        </select>

        <select name="transmission">
            <option value="Manual">Manual</option>
            <option value="Automatic">Automatic</option>
        </select>

        <button type="submit">Predict</button>
    </form>

    <h2>{{ prediction_text }}</h2>
</div>

</body>
</html>
